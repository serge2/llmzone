name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Убираем кеш здесь, чтобы избежать конфликтов нативных модулей
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in config files
        run: |
          node -e "
          const fs = require('fs');
          const newVersion = '${{ steps.get_version.outputs.VERSION }}';
          function updateJson(path) {
            const content = JSON.parse(fs.readFileSync(path, 'utf8'));
            content.version = newVersion;
            fs.writeFileSync(path, JSON.stringify(content, null, 2) + '\n');
          }
          updateJson('package.json');
          updateJson('src-tauri/tauri.conf.json');
          "

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build the app (Windows/macOS)
        if: matrix.platform != 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LLM Zone v__VERSION__'
          releaseBody: 'See the assets below for the latest installers.'
          releaseDraft: true
          prerelease: false
          # tauri-action сам выполнит npm install и npm run build корректно для каждой платформы

      - name: Build the app (Linux Docker)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          ./init-docker.sh
          ./build.sh

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          tag_name: ${{ github.ref_name }}
          # Делаем так, чтобы Linux не перезаписывал релиз, а дополнял его
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
